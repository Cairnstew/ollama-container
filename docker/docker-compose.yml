services:
  ollama:
    image: ghcr.io/cairnstew/ollama-container:latest
    container_name: ollama
    restart: unless-stopped
    # Privileged helps with execution permissions for the GPU probe on NixOS
    privileged: true 
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
      - /tmp:/tmp
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              capabilities: [gpu]
              device_ids:
                - nvidia.com/gpu=all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  ollama-pull:
    image: ghcr.io/cairnstew/ollama-container:latest
    container_name: ollama-pull
    restart: "no"
    privileged: true
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama-models:/root/.ollama
      - /tmp:/tmp
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              capabilities: [gpu]
              device_ids:
                - nvidia.com/gpu=all
    environment:
      - OLLAMA_HOST=ollama:11434  # This tells the 'pull' command where the server is
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # We wait a few extra seconds just to be safe, then pull
        sleep 5
        ollama pull llama3.2

volumes:
  ollama-models:
    driver: local