services:
  ollama:
    image: ghcr.io/cairnstew/ollama-container:latest
    container_name: ollama
    restart: unless-stopped
    # Privileged helps with execution permissions for the GPU probe on NixOS
    privileged: true 
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
      - /tmp:/tmp
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              capabilities: [gpu]
              device_ids:
                - nvidia.com/gpu=all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  ollama-pull:
    image: ghcr.io/cairnstew/ollama-container:latest
    container_name: ollama-pull
    restart: "no"
    privileged: true
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama-models:/root/.ollama
      - /tmp:/tmp
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              capabilities: [gpu]
              device_ids:
                - nvidia.com/gpu=all
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

volumes:
  ollama-models:
    driver: local